version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: darkom_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: darkom_dwh
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/01_init_databases.sql:/docker-entrypoint-initdb.d/01_init_databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d darkom_dwh"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: darkom_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: darkom_dwh
    volumes:
      - ./data:/app/data
      - ./sql:/app/sql
      - ./scripts:/app/scripts
    command: >
      sh -c "
        echo '=== Running SQL schema setup ===' &&
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U ${POSTGRES_USER} -d darkom_dwh -f /app/sql/02_staging_layer.sql &&
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U ${POSTGRES_USER} -d darkom_dwh -f /app/sql/03_clean_layer.sql &&
        PGPASSWORD=${POSTGRES_PASSWORD} psql -h postgres -U ${POSTGRES_USER} -d darkom_dwh -f /app/sql/04_warehouse_layer.sql &&
        echo '=== Running Python pipeline ===' &&
        python /app/scripts/01_load_staging.py &&
        python /app/scripts/02_clean_data.py &&
        python /app/scripts/03_load_warehouse.py &&
        python /app/scripts/04_validate.py &&
        echo '=== Pipeline complete ==='
      "

volumes:
  postgres_data: